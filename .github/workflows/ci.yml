name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  android:
    name: Android (Swift 6.3.2)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build and test on Android emulator
      uses: skiptools/swift-android-action@v2
      with:
        swift-version: 6.3.2

  windows:
    name: Windows (Swift 6.3.2)
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: compnerd/gha-setup-swift@main
      with:
        branch: swift-6.3.2-release
        tag: 6.3.2-RELEASE
    - name: Test
      run: swift test
