name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  android:
    name: Android (Swift 6.3.2)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build and test on Android emulator
      uses: skiptools/swift-android-action@v2
      with:
        swift-version: 6.3.2

  embedded:
    name: Embedded Swift (6.3.3)
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    # The Xcode-bundled toolchain has no Embedded stdlib; install a swift.org
    # toolchain, which ships it. Installs to /Library/Developer/Toolchains,
    # where Scripts/embedded-test.sh discovers it.
    - name: Install swift.org toolchain
      run: |
        set -euo pipefail
        PKG=swift-6.3.3-RELEASE-osx.pkg
        curl -fsSL -o "$PKG" "https://download.swift.org/swift-6.3.3-release/xcode/swift-6.3.3-RELEASE/${PKG}"
        sudo installer -pkg "$PKG" -target /
    - name: Cross-compile for bare metal + run embedded smoke test
      run: Scripts/embedded-test.sh

  windows:
    name: Windows (Swift 6.3.2)
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: compnerd/gha-setup-swift@main
      with:
        branch: swift-6.3.2-release
        tag: 6.3.2-RELEASE
    - name: Test
      run: swift test
