name: Coverage

on:
  push:
    branches: [master]
  pull_request:

jobs:
  coverage:
    name: Code Coverage
    runs-on: macos-latest
    permissions:
      contents: read
      code-quality: write # required by actions/upload-code-coverage
    steps:
    - uses: actions/checkout@v4
    - name: Export coverage and enforce threshold
      run: Scripts/coverage.sh
    - name: Upload coverage to GitHub Code Quality
      uses: actions/upload-code-coverage@v1
      with:
        file: .build/coverage/coverage.xml
        language: Swift
        label: code-coverage/llvm-cov
        # Keep this while a consumer repo might not have Code Quality enabled, so a
        # failed upload doesn't break CI.
        fail-on-error: false
    - name: Upload coverage artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: code-coverage
        path: .build/coverage/
        if-no-files-found: error
